<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AgendaFácil - Sistema de Agendamento</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- LOADER -->
<div id="loader">
    <div class="loader-content">
        <div class="agenda-icon">
            <div class="calendar-base">
                <div class="calendar-header"></div>
                <div class="calendar-days">
                    <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                </div>
                <div class="calendar-numbers" id="calendarNumbers"></div>
            </div>
        </div>
        <div class="dot-container">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="subtitle">sua organização com carinho</div>
    </div>
</div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="app.js"></script>
<script src="client-dashboard.js"></script>
<script src="provider-dashboard.js"></script>
    
</body>
</html>
